<svg width="200" height="60" viewBox="0 0 200 60" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2dcc6f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3de88a;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Target/Crosshair Icon -->
  <g filter="url(#glow)">
    <circle cx="24" cy="30" r="12" fill="none" stroke="url(#logo-grad)" stroke-width="2" />
    <circle cx="24" cy="30" r="4" fill="url(#logo-grad)" />
    <line x1="24" y1="12" x2="24" y2="18" stroke="url(#logo-grad)" stroke-width="2" stroke-linecap="round" />
    <line x1="24" y1="42" x2="24" y2="48" stroke="url(#logo-grad)" stroke-width="2" stroke-linecap="round" />
    <line x1="6" y1="30" x2="12" y2="30" stroke="url(#logo-grad)" stroke-width="2" stroke-linecap="round" />
    <line x1="36" y1="30" x2="42" y2="30" stroke="url(#logo-grad)" stroke-width="2" stroke-linecap="round" />
  </g>
  <!-- Text -->
  <text x="54" y="38" font-family="Inter, sans-serif" font-weight="700" font-size="24" fill="url(#logo-grad)">Bullseye</text>
</svg>